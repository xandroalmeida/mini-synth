# Configuração do Mini Synth.
# Os números de banco/programa MIDI vivem SOMENTE aqui — nunca no código.

soundfont:
  # Caminho da SoundFont padrão. Se não existir, o app procura automaticamente
  # em /usr/share/sounds/sf2, /usr/share/sounds/sf3, /usr/share/soundfonts e
  # ~/SoundFonts.
  path: "/usr/share/sounds/sf2/FluidR3_GM.sf2"

audio:
  # Driver de saída: "pulseaudio" funciona sobre o PipeWire (pipewire-pulse).
  # Alternativas: "alsa", "jack", "sdl2".
  driver: "pulseaudio"
  gain: 0.8
  sample_rate: 44100
  buffer_size: 256

midi:
  auto_connect: true
  preferred_device: ""

interface:
  fullscreen: false
  columns: 4

# Controles do teclado (knobs).
# Este teclado (chip Holtek) muda o que os knobs enviam conforme o banco/modo:
# já vimos o A1 mandar Program Change, CC 1 e CC 91 em momentos diferentes.
# Por isso tratamos TODOS os casos:
#   - Program Change (modo mais comum do A1) -> troca o instrumento (abaixo);
#   - CCs mapeados individualmente em 'knobs'.
# Descubra os CCs do seu com: `python scripts/midi-monitor.py`
# Ações possíveis: instrument, volume, reverb, octave, none.
controls:
  # Se o A1 enviar Program Change (0xC0), ele troca o instrumento.
  # Mapeamento direto: valor 1 -> 1º instrumento, ..., 12 -> 12º.
  # Acima de 12, fica no último (não avança).
  program_change_selects_instrument: true
  knobs:
    - cc: 1           # knob A1 (confirmado AO VIVO: envia CC 1)
      label: "A1"
      action: instrument   # girar A1 troca o instrumento
    # Os CCs abaixo apareceram na captura anterior (outro banco do teclado).
    # Ficam mapeados também para cobrir os dois bancos; ajuste se necessário.
    - cc: 91
      label: "knob"
      action: volume
    - cc: 93
      label: "knob"
      action: reverb
    - cc: 74
      label: "knob"
      action: octave
    - cc: 73
      label: "knob"
      action: volume
    - cc: 72
      label: "knob"
      action: reverb

