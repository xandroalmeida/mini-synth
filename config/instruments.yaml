# Configuração do Mini Synth.
# Os números de banco/programa MIDI vivem SOMENTE aqui — nunca no código.

soundfont:
  # Caminho da SoundFont padrão. Se não existir, o app procura automaticamente
  # em /usr/share/sounds/sf2, /usr/share/sounds/sf3, /usr/share/soundfonts e
  # ~/SoundFonts.
  path: "/usr/share/sounds/sf2/FluidR3_GM.sf2"

audio:
  # Driver de saída: "pulseaudio" funciona sobre o PipeWire (pipewire-pulse).
  # Alternativas: "alsa", "jack", "sdl2".
  driver: "pulseaudio"
  gain: 0.8
  sample_rate: 44100
  buffer_size: 256

midi:
  auto_connect: true
  preferred_device: ""

interface:
  fullscreen: false
  columns: 4

# Controles do teclado (knobs).
# ---------------------------------------------------------------------------
# MAPEAMENTO FÍSICO CONFIRMADO (ao vivo, com scripts/midi-debug.py).
# Este teclado tem 8 knobs em duas fileiras (A1..A4 em cima, B1..B4 embaixo):
#
#   Knob | Envia            | Significado MIDI          | Ação no app
#   -----+------------------+---------------------------+-------------------
#   A1   | Program Change   | troca de programa         | bank  (via PC, abaixo)
#   A2   | — (nada)         | provável DEFEITO no knob  | —
#   A3   | CC 91            | Reverb (Effects 1 Depth)  | instrument
#   A4   | CC 93            | Chorus (Effects 3 Depth)  | volume
#   B1   | CC 74            | Brightness / Cutoff       | octave
#   B2   | — (nada)         | provável DEFEITO no knob  | —
#   B3   | CC 73            | Attack Time               | reverb
#   B4   | CC 72            | Release Time              | none  (livre/reserva)
#
# OBS.: o "Significado MIDI" é o papel PADRÃO daquele CC no protocolo; aqui nós
# reaproveitamos os knobs para navegar/controlar o app (coluna "Ação no app").
# A2 e B2 não enviam nada — provável defeito no hardware deste teclado.
# Reconfira o seu com: `python scripts/midi-debug.py` (ou midi-monitor.py).
# Ações possíveis: bank, instrument, volume, reverb, octave, none.
controls:
  # A1 envia Program Change (0xC0) -> troca o BANCO.
  # Mapeamento direto: valor 1 -> 1º banco, ..., N -> N-ésimo. Acima, fica no último.
  program_change_selects_bank: true
  knobs:
    # A1 não aparece aqui: ele manda Program Change, tratado acima.
    - cc: 91          # A3
      label: "A3"
      action: instrument   # girar A3 troca o INSTRUMENTO dentro do banco
    - cc: 93          # A4
      label: "A4"
      action: volume
    - cc: 74          # B1
      label: "B1"
      action: octave
    - cc: 73          # B3
      label: "B3"
      action: reverb
    - cc: 72          # B4 — sem ação por ora (mude para volume/reverb/etc. se quiser)
      label: "B4"
      action: none

